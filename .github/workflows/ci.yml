name: BookFinder CI

# Trigger on every push and pull request to any branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint — check code quality
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check syntax
        working-directory: backend
        run: npm run lint

  # ─────────────────────────────────────────
  # Job 2: Test — start containers, hit /health
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        working-directory: backend
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl --silent --fail http://localhost:3000/health; then
              echo "API is ready!"
              exit 0
            fi
            echo "Attempt $i failed, waiting 5 seconds..."
            sleep 5
          done
          echo "API failed to start - printing container logs:"
          docker compose -f backend/docker-compose.yml logs
          exit 1

      - name: Test listings endpoint
        run: |
          curl --fail http://localhost:3000/api/listings
          echo "Listings endpoint passed!"

      - name: Tear down containers
        if: always()
        working-directory: backend
        run: docker compose down

  # ─────────────────────────────────────────
  # Job 3: Build — verify Docker image builds
  # ─────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t bookfinder-api:${{ github.sha }} .
          echo "Image built successfully: bookfinder-api:${{ github.sha }}"