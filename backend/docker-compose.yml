services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://bookfinder:localpassword@db:5432/bookfinder
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: bookfinder
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: bookfinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: